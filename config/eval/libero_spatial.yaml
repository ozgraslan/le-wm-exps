defaults:
  - launcher: local
  - solver: cem
  - _self_

world:
  env_name: swm/Libero-v0
  num_envs: ${eval.num_eval}
  max_episode_steps: ??? # make sure it's >= eval_budget
  history_size: 1
  frame_skip: 1

dataset:
  stats: ${eval.dataset_name}
  keys_to_cache:
    - action
    - proprio
    - state

seed: 42
policy: random # ckpt name or random
# cache_dir: /tmp

plan_config:
  horizon: 5
  receding_horizon: 5
  action_block: 5 # frameskip

# evaluation from dataset (replay expert trajectories)
eval:
  num_eval: 1
  goal_offset_steps: 25
  eval_budget: 50
  img_size: 224
  dataset_name: libero_spatial_test
  callables:
    # -- set state
    - method: _set_state
      args:
        sim_state:
          value: state
    # -- set goal state
    - method: _set_goal
      args:
        goal:
          value: goal
        goal_eef_pos:
          value: goal_eef_pos
        goal_sim_state:
          value: goal_state
        akita_black_bowl_1_pos:
          value: goal_akita_black_bowl_1_pos
        plate_1_pos:
          value: goal_plate_1_pos

output:
  filename: libero_spatial_results.txt